<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F4FBF7">
<meta name="apple-mobile-web-app-capable" content="yes">

  <meta property="og:title" content="Reservar cita · Centro Cuídate">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   CENTRO CUÍDATE — Booking · Diseño 2026
   Filosofía: glassmorphism + verde profundo + acentos dorados
   Premium wellness · animaciones suaves · jerarquía visual fuerte
═══════════════════════════════════════════════════════════════ */

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  /* ─── Paleta principal (MODO CLARO LUMINOSO) ─── */
  --green:#1FAA76;
  --green-light:#2ECC8E;
  --green-dark:#0F7D52;
  --green-deep:#075339;

  --gold:#C9952A;
  --gold-light:#D4A24A;
  --gold-dark:#8A6010;

  /* Fondos LUMINOSOS — blanco con tinte verde sutil */
  --bg:#F4FBF7;            /* casi blanco con un toque verde muy sutil */
  --bg-2:#EAF5EE;
  --surface:#FFFFFF;
  --surface-2:#F7FBF8;
  --surface-3:#EBF5EF;
  --surface-glass:rgba(255,255,255,.72);

  /* Bordes */
  --border:rgba(15,77,52,.08);
  --border-2:rgba(15,77,52,.15);
  --border-accent:rgba(31,170,118,.32);

  /* Texto OSCURO sobre claro */
  --text:#0E2419;
  --text-2:rgba(14,36,25,.72);
  --text-3:rgba(14,36,25,.48);
  --text-muted:rgba(14,36,25,.28);

  /* Estados */
  --red:#D84A3F;
  --amber:#E89B1B;
  --blue:#2B7DD1;

  /* Geometría */
  --r-sm:10px;
  --r:14px;
  --r-md:18px;
  --r-lg:24px;
  --r-xl:32px;
  --r-pill:100px;

  /* Sombras (más suaves para fondo claro) */
  --shadow-xs:0 1px 2px rgba(15,77,52,.06);
  --shadow-sm:0 4px 12px rgba(15,77,52,.08);
  --shadow-md:0 8px 24px rgba(15,77,52,.10);
  --shadow-lg:0 16px 40px rgba(15,77,52,.14);
  --shadow-glow:0 0 32px rgba(31,170,118,.18);
  --shadow-gold:0 0 28px rgba(201,149,42,.18);

  /* Safe areas */
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);

  /* Accents (compatibilidad con código antiguo) */
  --accent:var(--green);
  --accent-dark:var(--green-dark);
  --accent-light:rgba(31,170,118,.10);
  --accent-glow:rgba(31,170,118,.20);

  /* ─── Aliases con sintaxis antigua (sin guion) para compatibilidad con JS ─── */
  --surface2:var(--surface-2);
  --surface3:var(--surface-3);
  --border2:var(--border-2);
  --text2:var(--text-2);
  --text3:var(--text-3);
  --green-glow:rgba(31,170,118,.20);

  /* Curvas de animación */
  --ease-out:cubic-bezier(.16,.84,.44,1);
  --ease-spring:cubic-bezier(.32,1.4,.42,1);
}

html{
  background:var(--bg);
  min-height:100vh;
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
}

body{
  font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--text);
  background:var(--bg);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  padding-bottom:calc(40px + var(--safe-b));
  overflow-x:hidden;
  position:relative;
}

/* Fondo decorativo: orbes de color difuminados (sutil para fondo claro) */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(ellipse 700px 500px at 15% 10%, rgba(31,170,118,.08), transparent 65%),
    radial-gradient(ellipse 600px 400px at 85% 25%, rgba(201,149,42,.06), transparent 65%),
    radial-gradient(ellipse 800px 600px at 50% 110%, rgba(31,170,118,.05), transparent 65%);
}

/* Patrón sutil de grano */
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  opacity:.02;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.7'/></svg>");
}

/* Asegurar que el contenido vaya por encima */
.bk-hero, .steps-wrap, #bkMain, .bk-footer{position:relative;z-index:5}

/* ═══════════════════════════════════════════════════════════════
   HERO · Cabecera con logo del centro + gradiente
═══════════════════════════════════════════════════════════════ */
.bk-hero{
  position:relative;
  padding:calc(var(--safe-t) + 24px) 20px 30px;
  overflow:hidden;
  isolation:isolate;
  background:linear-gradient(180deg, rgba(31,170,118,.05) 0%, transparent 100%);
  border-bottom:1px solid var(--border);
}
.bk-hero-bg{
  position:absolute;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(ellipse 80% 70% at 50% 0%, rgba(31,170,118,.18), transparent 70%),
    radial-gradient(ellipse 60% 60% at 100% 100%, rgba(201,149,42,.12), transparent 70%);
}
.bk-hero-bg::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4'/></svg>");
  opacity:.04;
}
.bk-hero-inner{
  max-width:560px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:18px;
  position:relative;
}
.bk-hero-logo{
  width:84px;height:84px;
  border-radius:24px;
  flex-shrink:0;
  object-fit:cover;
  background:#fff;
  border:2px solid rgba(31,170,118,.18);
  box-shadow:
    0 12px 32px rgba(15,77,52,.18),
    0 0 0 6px rgba(31,170,118,.08),
    inset 0 1px 0 rgba(255,255,255,.5);
  animation:logo-pulse 4s ease-in-out infinite;
}
@keyframes logo-pulse{
  0%,100%{box-shadow:0 12px 32px rgba(15,77,52,.18),0 0 0 6px rgba(31,170,118,.08),inset 0 1px 0 rgba(255,255,255,.5);}
  50%{box-shadow:0 14px 40px rgba(15,77,52,.22),0 0 0 8px rgba(31,170,118,.14),inset 0 1px 0 rgba(255,255,255,.5);}
}
.bk-hero-text{flex:1;min-width:0}
.bk-hero-welcome{
  font-size:11px;
  font-weight:700;
  color:var(--green);
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:2px;
}
.bk-hero-name{
  font-family:'Playfair Display',serif;
  font-size:22px;
  font-weight:700;
  color:var(--text);
  line-height:1.1;
  letter-spacing:-.5px;
}
.bk-hero-sub{
  font-size:12.5px;
  color:var(--text-2);
  font-weight:600;
  margin-top:4px;
  line-height:1.4;
}
.bk-hero-actions{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
  flex-shrink:0;
}

/* ─── Selector de idioma ─── */
.lang-switch{
  display:flex;
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:var(--r-pill);
  padding:3px;
  box-shadow:var(--shadow-xs);
}
.lang-btn{
  border:none;
  background:transparent;
  padding:5px 11px;
  font-size:11px;
  font-weight:800;
  font-family:inherit;
  color:var(--text-3);
  border-radius:var(--r-pill);
  cursor:pointer;
  letter-spacing:.04em;
  transition:all .25s var(--ease-out);
}
.lang-btn.active{
  background:linear-gradient(135deg, var(--green), var(--green-dark));
  color:#fff;
  box-shadow:0 2px 6px rgba(31,170,118,.32);
}
.lang-btn:not(.active):hover{
  color:var(--text);
}

/* Mantener clase antigua .bk-hdr para compatibilidad */
.bk-hdr{display:none}
.bk-logo{display:none}

.bk-online{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;
  background:rgba(31,170,118,.10);
  border:1px solid rgba(31,170,118,.28);
  border-radius:var(--r-pill);
  font-size:10px;
  font-weight:700;
  color:var(--green-dark);
  letter-spacing:.04em;
  text-transform:uppercase;
}
.online-dot{
  width:6px;height:6px;
  background:var(--green);
  border-radius:50%;
  box-shadow:0 0 6px var(--green);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.6;transform:scale(.85)}
}

/* Responsive hero */
@media (max-width: 420px){
  .bk-hero{padding:calc(var(--safe-t) + 16px) 16px 22px}
  .bk-hero-inner{gap:14px}
  .bk-hero-logo{width:68px;height:68px;border-radius:20px}
  .bk-hero-name{font-size:19px}
  .bk-hero-welcome{font-size:10px}
}
@media (max-width: 360px){
  .bk-hero-inner{flex-wrap:wrap}
  .bk-hero-actions{flex-direction:row;order:-1;width:100%;justify-content:space-between}
}

/* ═══════════════════════════════════════════════════════════════
   STEPS · Progress modernizado
═══════════════════════════════════════════════════════════════ */
.steps-wrap{
  display:flex;align-items:center;
  padding:18px 22px 8px;
  gap:6px;
  overflow-x:auto;
  scrollbar-width:none;
}
.steps-wrap::-webkit-scrollbar{display:none}

.step-item{
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
  font-size:11px;
  font-weight:700;
  color:var(--text-3);
  transition:color .3s var(--ease-out);
  letter-spacing:.02em;
}
.step-item.active{color:var(--green-light)}
.step-item.done{color:var(--text-2)}

.step-num{
  width:26px;height:26px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
  background:var(--surface-2);
  border:1.5px solid var(--border-2);
  color:var(--text-3);
  transition:all .3s var(--ease-spring);
  flex-shrink:0;
}
.step-item.active .step-num{
  background:linear-gradient(135deg, var(--green), var(--green-dark));
  border-color:var(--green);
  color:#fff;
  box-shadow:0 0 0 4px rgba(31,170,118,.15);
  transform:scale(1.08);
}
.step-item.done .step-num{
  background:var(--green-deep);
  border-color:var(--green-dark);
  color:var(--green-light);
}

.step-bar{
  flex:1;height:1.5px;
  background:var(--border);
  border-radius:2px;
  min-width:14px;
  transition:background .3s var(--ease-out);
}
.step-bar.done{background:linear-gradient(90deg, var(--green-dark), var(--green))}

/* ═══════════════════════════════════════════════════════════════
   BACK BAR · Botón "volver" sticky en steps 2 y 3
═══════════════════════════════════════════════════════════════ */
.bk-backbar{
  position:sticky;top:0;z-index:40;
  padding:10px 20px 6px;
  background:linear-gradient(180deg, rgba(244,251,247,.95) 75%, rgba(244,251,247,0));
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  max-width:560px;
  margin:0 auto;
}
.bk-back-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 16px 9px 12px;
  background:var(--surface);
  border:1.5px solid var(--border-2);
  border-radius:var(--r-pill);
  color:var(--text);
  font-size:13px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  box-shadow:var(--shadow-xs);
  transition:all .22s var(--ease-out);
}
.bk-back-btn:hover{
  background:var(--surface-2);
  border-color:var(--green);
  transform:translateX(-2px);
  box-shadow:var(--shadow-sm);
}
.bk-back-btn:active{
  transform:translateX(0) scale(.97);
}
.bk-back-btn svg{
  flex-shrink:0;
  transition:transform .22s var(--ease-out);
  color:var(--green);
}
.bk-back-btn:hover svg{transform:translateX(-2px)}

/* ═══════════════════════════════════════════════════════════════
   BODY · contenedor con padding
═══════════════════════════════════════════════════════════════ */
.bk-body{
  padding:8px 20px 24px;
  max-width:560px;
  margin:0 auto;
}

@keyframes fade-up{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:none}
}
.fade-up{animation:fade-up .5s var(--ease-out) both}
.fade-up > *{animation:fade-up .5s var(--ease-out) both}
.fade-up > *:nth-child(2){animation-delay:.06s}
.fade-up > *:nth-child(3){animation-delay:.12s}
.fade-up > *:nth-child(4){animation-delay:.18s}
.fade-up > *:nth-child(5){animation-delay:.24s}

/* ═══════════════════════════════════════════════════════════════
   TÍTULOS DE SECCIÓN · Playfair grandes y elegantes
═══════════════════════════════════════════════════════════════ */
.sec-title{
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:700;
  color:var(--text);
  line-height:1.15;
  letter-spacing:-.5px;
  margin-bottom:6px;
}
.sec-sub{
  font-size:13.5px;
  color:var(--text-2);
  font-weight:500;
  line-height:1.55;
  margin-bottom:22px;
}

/* ═══════════════════════════════════════════════════════════════
   CENTER CARD (cuando hay multi-centro)
═══════════════════════════════════════════════════════════════ */
.center-card{
  display:flex;align-items:center;gap:14px;
  background:var(--surface-glass);
  backdrop-filter:blur(20px);
  border:1.5px solid var(--border-2);
  border-radius:var(--r-lg);
  padding:18px;
  cursor:pointer;
  transition:all .3s var(--ease-out);
  margin-bottom:12px;
}
.center-card:hover{
  border-color:rgba(31,170,118,.4);
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}
.cc-logo-wrap{
  width:56px;height:56px;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(31,170,118,.2), rgba(201,149,42,.12));
  border:1.5px solid rgba(31,170,118,.28);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.center-name{
  font-family:'Playfair Display',serif;
  font-size:18px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-.2px;
}
.center-addr{
  font-size:12px;
  color:var(--text-3);
  font-weight:500;
  line-height:1.55;
}
.center-arrow{
  color:var(--green);
  font-size:22px;
  font-weight:800;
}

/* ═══════════════════════════════════════════════════════════════
   SERVICE CARDS · Premium con gradientes
═══════════════════════════════════════════════════════════════ */
.svc-card{
  position:relative;
  display:flex;align-items:flex-start;gap:14px;
  background:var(--surface-glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1.5px solid var(--border-2);
  border-radius:var(--r-lg);
  padding:18px;
  margin-bottom:12px;
  cursor:pointer;
  transition:all .35s var(--ease-out);
  overflow:hidden;
}
.svc-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(31,170,118,.04), transparent 60%);
  opacity:0;
  transition:opacity .35s ease;
  pointer-events:none;
}
.svc-card:hover{
  border-color:rgba(31,170,118,.4);
  transform:translateY(-3px);
  box-shadow:var(--shadow-md), var(--shadow-glow);
}
.svc-card:hover::before{opacity:1}
.svc-card:active{transform:translateY(-1px)}

.svc-card.selected{
  border-color:var(--green);
  background:linear-gradient(135deg, rgba(31,170,118,.10), rgba(31,170,118,.04));
  box-shadow:0 0 0 4px rgba(31,170,118,.15), var(--shadow-glow);
}

.svc-card.popular{
  border-color:rgba(201,149,42,.32);
}
.svc-card.popular::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(201,149,42,.06), transparent 60%);
  pointer-events:none;
}

.svc-icon{
  width:54px;height:54px;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(31,170,118,.16), rgba(31,170,118,.04));
  border:1px solid rgba(31,170,118,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  flex-shrink:0;
  position:relative;
  z-index:2;
}
.svc-card.popular .svc-icon{
  background:linear-gradient(135deg, rgba(201,149,42,.2), rgba(201,149,42,.05));
  border-color:rgba(201,149,42,.32);
}

.svc-info{flex:1;min-width:0;position:relative;z-index:2}
.svc-name{
  font-family:'Playfair Display',serif;
  font-size:17px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-.2px;
  line-height:1.2;
}
.svc-tag{
  display:inline-block;
  padding:3px 9px;
  background:linear-gradient(135deg, var(--gold), var(--gold-dark));
  color:#fff;
  font-size:9.5px;
  font-weight:800;
  border-radius:var(--r-pill);
  letter-spacing:.04em;
  text-transform:uppercase;
  margin-left:6px;
  box-shadow:0 2px 8px rgba(201,149,42,.4);
  white-space:nowrap;
}
.svc-dur{
  font-size:11.5px;
  color:var(--text-3);
  font-weight:600;
  margin-top:5px;
  display:flex;align-items:center;gap:5px;
}
.svc-desc{
  font-size:12px;
  color:var(--text-2);
  font-weight:500;
  margin-top:6px;
  line-height:1.55;
}

.svc-price{
  position:relative;z-index:2;
  font-family:'Playfair Display',serif;
  font-size:22px;
  font-weight:700;
  color:var(--gold-light);
  flex-shrink:0;
}
.svc-price.free{
  background:linear-gradient(135deg, var(--green), var(--green-light));
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  font-size:18px;
  font-weight:800;
}

.svc-check{
  position:absolute;
  top:14px;right:14px;
  width:28px;height:28px;
  border-radius:50%;
  background:var(--green);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;
  opacity:0;
  transform:scale(.5);
  transition:all .3s var(--ease-spring);
  box-shadow:0 4px 12px rgba(31,170,118,.5);
  z-index:3;
}
.svc-card.selected .svc-check{opacity:1;transform:scale(1)}

/* ═══════════════════════════════════════════════════════════════
   TRUST ROW
═══════════════════════════════════════════════════════════════ */
.trust-row{
  display:flex;
  justify-content:space-around;
  gap:8px;
  margin:24px 0 16px;
  padding:14px 8px;
  background:var(--surface-glass);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:var(--r-md);
}
.trust-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-size:10.5px;
  color:var(--text-2);
  font-weight:700;
  letter-spacing:.02em;
  text-align:center;
  line-height:1.3;
}
.trust-item-icon{
  font-size:16px;
  color:var(--green);
}

/* ═══════════════════════════════════════════════════════════════
   BOTONES
═══════════════════════════════════════════════════════════════ */
.bk-btn{
  width:100%;
  padding:15px 20px;
  background:linear-gradient(135deg, var(--green), var(--green-dark));
  border:none;
  border-radius:var(--r-md);
  color:#fff;
  font-size:15px;
  font-weight:800;
  font-family:inherit;
  cursor:pointer;
  letter-spacing:.01em;
  box-shadow:
    0 6px 20px rgba(31,170,118,.32),
    inset 0 1px 0 rgba(255,255,255,.15);
  transition:all .25s var(--ease-out);
  position:relative;
  overflow:hidden;
}
.bk-btn::after{
  content:"";
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
  transition:left .6s ease;
}
.bk-btn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 10px 28px rgba(31,170,118,.45),
    inset 0 1px 0 rgba(255,255,255,.15);
}
.bk-btn:hover::after{left:100%}
.bk-btn:active{transform:translateY(0)}
.bk-btn:disabled{
  opacity:.5;
  cursor:not-allowed;
  transform:none;
}

.bk-btn-ghost{
  display:block;
  width:100%;
  padding:14px 20px;
  background:transparent;
  border:1.5px solid var(--border-2);
  border-radius:var(--r-md);
  color:var(--text-2);
  font-size:13.5px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  letter-spacing:.01em;
  margin-top:14px;
  text-align:center;
  transition:all .2s var(--ease-out);
}
.bk-btn-ghost:hover{
  border-color:var(--border-accent);
  color:var(--text);
  background:rgba(31,170,118,.04);
}

/* ═══════════════════════════════════════════════════════════════
   CALENDARIO
═══════════════════════════════════════════════════════════════ */
.cal-card{
  background:var(--surface-glass);
  backdrop-filter:blur(20px);
  border:1.5px solid var(--border-2);
  border-radius:var(--r-lg);
  padding:18px 16px;
  margin-bottom:16px;
}

.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
  padding:0 4px;
}
.cal-btn{
  width:36px;height:36px;
  border-radius:12px;
  background:var(--surface-2);
  border:1px solid var(--border-2);
  color:var(--text-2);
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:inherit;
  transition:all .2s var(--ease-out);
}
.cal-btn:hover{
  background:rgba(31,170,118,.08);
  border-color:rgba(31,170,118,.32);
  color:var(--green-light);
}
.cal-month-lbl{
  font-family:'Playfair Display',serif;
  font-size:17px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-.2px;
  text-transform:capitalize;
}

.cal-weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-bottom:8px;
}
.cal-wd{
  font-size:10px;
  font-weight:800;
  color:var(--text-3);
  text-transform:uppercase;
  letter-spacing:.08em;
  text-align:center;
  padding:8px 0;
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.cal-day{
  aspect-ratio:1;
  border-radius:12px;
  background:transparent;
  border:1px solid transparent;
  color:var(--text-2);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease-out);
  position:relative;
}
.cal-day.empty{visibility:hidden}
.cal-day.disabled{
  color:var(--text-muted);
  cursor:not-allowed;
}
.cal-day.available{
  background:var(--surface-2);
  border-color:var(--border);
  color:var(--text);
}
.cal-day.available:hover{
  background:rgba(31,170,118,.12);
  border-color:rgba(31,170,118,.32);
  transform:scale(1.05);
}
.cal-day.today{
  background:rgba(201,149,42,.08);
  border-color:rgba(201,149,42,.32);
  color:var(--gold-light);
}
.cal-day.today::after{
  content:"";
  position:absolute;
  bottom:5px;left:50%;
  transform:translateX(-50%);
  width:4px;height:4px;
  border-radius:50%;
  background:var(--gold);
}
.cal-day.selected{
  background:linear-gradient(135deg, var(--green), var(--green-dark));
  border-color:var(--green);
  color:#fff;
  box-shadow:0 4px 14px rgba(31,170,118,.4);
  transform:scale(1.04);
}
.cal-day.selected::after{display:none}

/* Aliases de clases (nombres antiguos en JS) */
.cal-day.past{
  color:var(--text-muted);
  cursor:not-allowed;
}
.cal-day.closed{
  color:var(--text-muted);
  cursor:not-allowed;
  opacity:.4;
}
.cal-day.avail{
  background:var(--surface-2);
  border-color:var(--border);
  color:var(--text);
  position:relative;
}
.cal-day.avail:hover{
  background:rgba(31,170,118,.12);
  border-color:rgba(31,170,118,.32);
  transform:scale(1.05);
}
.cal-day.today-ring{
  background:rgba(201,149,42,.08);
  border-color:rgba(201,149,42,.32);
  color:var(--gold-light);
}
.cal-day.sel{
  background:linear-gradient(135deg, var(--green), var(--green-dark));
  border-color:var(--green);
  color:#fff;
  box-shadow:0 4px 14px rgba(31,170,118,.4);
  transform:scale(1.04);
}
.cal-dow{
  font-size:10px;
  font-weight:800;
  color:var(--text-3);
  text-transform:uppercase;
  letter-spacing:.08em;
  text-align:center;
  padding:8px 0;
}
.avail-dot{
  position:absolute;
  bottom:5px;left:50%;
  transform:translateX(-50%);
  width:4px;height:4px;
  border-radius:50%;
  background:var(--green);
  opacity:.7;
}

/* ═══════════════════════════════════════════════════════════════
   SLOTS DE HORA
═══════════════════════════════════════════════════════════════ */
.slots-wrap{margin-bottom:16px}

.slots-section{
  margin-bottom:18px;
}
.slots-section-title{
  font-size:11px;
  font-weight:800;
  color:var(--text-3);
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.slots-section-title::before{
  content:"";
  width:18px;height:1px;
  background:var(--text-3);
}

.slots-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(80px, 1fr));
  gap:8px;
}

.slot-btn{
  padding:12px 4px;
  background:var(--surface-2);
  border:1px solid var(--border-2);
  border-radius:12px;
  color:var(--text);
  font-size:13.5px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  transition:all .2s var(--ease-out);
  text-align:center;
}
.slot-btn:hover:not(:disabled){
  background:rgba(31,170,118,.1);
  border-color:rgba(31,170,118,.4);
  transform:translateY(-1px);
}
.slot-btn.selected, .slot-btn.sel{
  background:linear-gradient(135deg, var(--green), var(--green-dark));
  border-color:var(--green);
  color:#fff;
  box-shadow:0 4px 14px rgba(31,170,118,.4);
}
.slot-btn.taken, .slot-btn:disabled{
  background:transparent;
  color:var(--text-muted);
  cursor:not-allowed;
  border-color:var(--border);
  text-decoration:line-through;
}
.slots-period-lbl{
  font-size:11px;
  font-weight:800;
  color:var(--text-3);
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.slots-period-lbl::before{
  content:"";
  width:18px;height:1px;
  background:var(--text-3);
}

.no-slots{
  text-align:center;
  padding:32px 16px;
  background:var(--surface-glass);
  border:1px dashed var(--border-2);
  border-radius:var(--r-md);
  color:var(--text-3);
  font-size:13px;
  font-weight:600;
  line-height:1.6;
}

.date-pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 14px;
  background:linear-gradient(135deg, rgba(31,170,118,.14), rgba(31,170,118,.05));
  border:1px solid rgba(31,170,118,.32);
  border-radius:var(--r-pill);
  color:var(--green-light);
  font-size:12px;
  font-weight:800;
  letter-spacing:.02em;
  margin-bottom:12px;
}

/* ═══════════════════════════════════════════════════════════════
   FORM (datos finales)
═══════════════════════════════════════════════════════════════ */
.bk-field{margin-bottom:14px}
.bk-lbl{
  display:block;
  font-size:11px;
  font-weight:800;
  color:var(--text-3);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:7px;
}
.bk-inp{
  width:100%;
  padding:14px 16px;
  background:var(--surface-2);
  border:1.5px solid var(--border-2);
  border-radius:14px;
  color:var(--text);
  font-size:15px;
  font-weight:600;
  font-family:inherit;
  transition:all .2s var(--ease-out);
  -webkit-appearance:none;
}
.bk-inp::placeholder{color:var(--text-muted)}
.bk-inp:focus{
  outline:none;
  border-color:var(--green);
  background:rgba(31,170,118,.04);
  box-shadow:0 0 0 4px rgba(31,170,118,.12);
}
textarea.bk-inp{resize:none;line-height:1.55;font-size:14px}

/* Summary card en step 3 */
.summary-card{
  background:linear-gradient(135deg, rgba(31,170,118,.08), rgba(201,149,42,.04));
  border:1.5px solid rgba(31,170,118,.22);
  border-radius:var(--r-lg);
  padding:18px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}
.summary-card::before{
  content:"";
  position:absolute;
  top:-50%;right:-30%;
  width:200px;height:200px;
  background:radial-gradient(circle, rgba(31,170,118,.18), transparent 60%);
  pointer-events:none;
}
.summary-row{
  display:flex;justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid var(--border);
  position:relative;
  z-index:2;
}
.summary-row:last-child{border-bottom:none}
.summary-row .lbl{
  font-size:11.5px;
  color:var(--text-3);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.summary-row .val{
  font-size:14px;
  color:var(--text);
  font-weight:700;
  text-align:right;
}

/* Info banner */
.info-banner{
  background:linear-gradient(135deg, rgba(31,170,118,.07), rgba(31,170,118,.02));
  border:1px solid rgba(31,170,118,.22);
  border-left:3px solid var(--green);
  border-radius:var(--r);
  padding:13px 15px;
  margin-bottom:18px;
  font-size:12.5px;
  color:var(--text-2);
  font-weight:600;
  line-height:1.6;
}

/* GDPR */
.gdpr-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;
  background:var(--surface-2);
  border:1px solid var(--border-2);
  border-radius:14px;
  margin-bottom:16px;
}
.gdpr-row input[type=checkbox]{
  width:20px;height:20px;
  min-width:20px;
  accent-color:var(--green);
  margin-top:2px;
  cursor:pointer;
}
.gdpr-row label{
  font-size:12px;
  color:var(--text-2);
  font-weight:500;
  line-height:1.6;
  cursor:pointer;
}
.gdpr-row label a{color:var(--green-light);text-decoration:underline}
.gdpr-row label strong{color:var(--text);font-weight:700}

/* Error message */
.bk-error{
  background:rgba(216,74,63,.1);
  border:1px solid rgba(216,74,63,.28);
  border-radius:var(--r);
  padding:12px 14px;
  color:#FFA59B;
  font-size:13px;
  font-weight:700;
  margin-bottom:14px;
  text-align:center;
  display:none;
}
.bk-error.show{display:block;animation:fade-up .3s var(--ease-out)}
.bk-err{
  background:rgba(216,74,63,.1);
  border:1px solid rgba(216,74,63,.28);
  border-radius:var(--r);
  padding:12px 14px;
  color:#FFA59B;
  font-size:13px;
  font-weight:700;
  margin-bottom:14px;
  text-align:center;
}

/* ═══════════════════════════════════════════════════════════════
   WORKSHOPS
═══════════════════════════════════════════════════════════════ */
.ws-card{
  display:flex;align-items:center;gap:14px;
  background:var(--surface-glass);
  backdrop-filter:blur(20px);
  border:1.5px solid var(--border-2);
  border-radius:var(--r-lg);
  padding:16px;
  margin-bottom:12px;
  cursor:pointer;
  transition:all .3s var(--ease-out);
  position:relative;
  overflow:hidden;
}
.ws-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(31,170,118,.04), transparent 60%);
  opacity:0;
  transition:opacity .3s ease;
  pointer-events:none;
}
.ws-card:hover{
  border-color:rgba(31,170,118,.4);
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}
.ws-card:hover::before{opacity:1}
.ws-card.selected{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(31,170,118,.18), var(--shadow-md);
}

/* ═══════════════════════════════════════════════════════════════
   SUCCESS SCREEN
═══════════════════════════════════════════════════════════════ */
.success-wrap{
  text-align:center;
  padding:40px 20px;
}
.success-icon, .success-ring{
  width:96px;height:96px;
  margin:0 auto 24px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--green), var(--green-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:46px;
  color:#fff;
  box-shadow:
    0 0 0 8px rgba(31,170,118,.12),
    0 12px 32px rgba(31,170,118,.4);
  animation:success-pop .7s var(--ease-spring) both;
}
@keyframes success-pop{
  0%{opacity:0;transform:scale(.3)}
  60%{opacity:1;transform:scale(1.1)}
  100%{transform:scale(1)}
}
.success-title{
  font-family:'Playfair Display',serif;
  font-size:30px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-.5px;
  margin-bottom:8px;
}
.success-sub{
  font-size:14px;
  color:var(--text-2);
  font-weight:600;
  line-height:1.6;
  margin-bottom:24px;
}

/* Tarjeta de dirección en success */
.addr-card{
  background:var(--surface-glass);
  backdrop-filter:blur(20px);
  border:1.5px solid var(--border-2);
  border-radius:var(--r-lg);
  padding:18px;
  margin:18px auto 16px;
  max-width:340px;
  text-align:left;
}
.addr-sede-name{
  font-family:'Playfair Display',serif;
  font-size:16px;
  font-weight:700;
  color:var(--text);
  margin-bottom:10px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.addr-line{
  display:flex;align-items:flex-start;gap:10px;
  padding:7px 0;
  font-size:13px;
  color:var(--text-2);
  font-weight:600;
  line-height:1.5;
}
.addr-line strong{color:var(--text);font-weight:800}
.addr-icon{
  width:24px;
  font-size:15px;
  flex-shrink:0;
  text-align:center;
}

/* Botón de Maps */
.bk-btn-map{
  display:block;
  width:100%;
  max-width:340px;
  margin:14px auto 0;
  padding:13px 18px;
  background:rgba(31,170,118,.10);
  border:1.5px solid rgba(31,170,118,.32);
  border-radius:var(--r-pill);
  color:var(--green-light);
  font-size:13.5px;
  font-weight:800;
  text-decoration:none;
  text-align:center;
  letter-spacing:.02em;
  transition:all .25s var(--ease-out);
}
.bk-btn-map:hover{
  background:rgba(31,170,118,.18);
  transform:translateY(-2px);
}

/* ═══════════════════════════════════════════════════════════════
   LOADING
═══════════════════════════════════════════════════════════════ */
.loading-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;
  gap:18px;
}
.spinner{
  width:46px;height:46px;
  border:3px solid var(--surface-2);
  border-top-color:var(--green);
  border-right-color:var(--green-light);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-lbl{
  font-size:13px;
  color:var(--text-3);
  font-weight:600;
  letter-spacing:.02em;
}

/* ═══════════════════════════════════════════════════════════════
   FOOTER · contacto y dirección
═══════════════════════════════════════════════════════════════ */
.bk-footer{
  max-width:560px;
  margin:32px auto 16px;
  padding:0 20px;
  text-align:center;
}
.bk-footer-card{
  background:var(--surface-glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:18px;
}
.bk-footer-name{
  font-family:'Playfair Display',serif;
  font-size:16px;
  font-weight:700;
  color:var(--text);
  margin-bottom:4px;
}
.bk-footer-addr{
  font-size:11.5px;
  color:var(--text-3);
  font-weight:600;
  line-height:1.55;
  margin-bottom:10px;
}
.bk-footer-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;
  background:rgba(31,170,118,.08);
  border:1px solid rgba(31,170,118,.22);
  border-radius:var(--r-pill);
  color:var(--green-light);
  font-size:11.5px;
  font-weight:700;
  text-decoration:none;
  letter-spacing:.02em;
  transition:all .2s var(--ease-out);
}
.bk-footer-link:hover{
  background:rgba(31,170,118,.16);
  transform:translateY(-1px);
}

.bk-credits{
  font-size:10px;
  color:var(--text-muted);
  font-weight:600;
  margin-top:14px;
  letter-spacing:.02em;
}
.bk-credits strong{color:var(--text-3)}

/* ═══════════════════════════════════════════════════════════════
   SUMMARY BOX (resumen final antes de confirmar)
═══════════════════════════════════════════════════════════════ */
.summary-box{
  background:linear-gradient(135deg, rgba(31,170,118,.07), rgba(201,149,42,.03));
  border:1.5px solid rgba(31,170,118,.22);
  border-radius:var(--r-lg);
  margin-bottom:20px;
  overflow:hidden;
  position:relative;
  box-shadow:var(--shadow-sm);
}
.summary-box::before{
  content:"";
  position:absolute;
  top:-60%;right:-30%;
  width:240px;height:240px;
  background:radial-gradient(circle, rgba(31,170,118,.16), transparent 60%);
  pointer-events:none;
}
.summary-header{
  padding:16px 18px;
  border-bottom:1px solid rgba(31,170,118,.18);
  position:relative;z-index:2;
  background:rgba(31,170,118,.04);
}
.summary-sede-name{
  font-family:'Playfair Display',serif;
  font-size:17px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-.2px;
  margin-bottom:3px;
}
.summary-sede-addr{
  font-size:11.5px;
  color:var(--text-3);
  font-weight:600;
  line-height:1.5;
}
.summary-rows{
  padding:6px 18px;
  position:relative;z-index:2;
}
.sum-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;
  border-bottom:1px solid var(--border);
  gap:14px;
}
.sum-row:last-child{border-bottom:none}
.sum-lbl{
  font-size:11.5px;
  color:var(--text-3);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.04em;
  flex-shrink:0;
}
.sum-val{
  font-size:14px;
  color:var(--text);
  font-weight:700;
  text-align:right;
}

/* Notice text */
.bk-notice{
  font-size:11.5px;
  color:var(--text-3);
  font-weight:600;
  line-height:1.55;
  text-align:center;
  margin-top:16px;
  padding:0 8px;
}

/* ═══════════════════════════════════════════════════════════════
   COMPATIBILIDAD con clases antiguas del JS
═══════════════════════════════════════════════════════════════ */
.bk-input{padding:14px 16px}
.sr-only{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
kbd{font-family:monospace;font-size:11px}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════════ */
@media (max-width: 380px){
  .sec-title{font-size:24px}
  .svc-card{padding:14px;gap:10px}
  .svc-icon{width:46px;height:46px;font-size:22px}
  .svc-name{font-size:15px}
  .svc-tag{font-size:9px;padding:2px 7px}
  .bk-hdr-name{font-size:16px}
  .bk-logo{width:40px;height:40px;font-size:20px}
  .cal-day{font-size:13px}

    online.innerHTML='';

/* ─── THEME HELPER ─── */
function applyAccent(center){
  var c=CENTERS[center];
  document.documentElement.style.setProperty('--accent',c.color);
  document.documentElement.style.setProperty('--accent-dark',center==='cc'?'#1BA370':'#8A6010');
  document.documentElement.style.setProperty('--accent-light','rgba('+c.colorRgb+',.1)');
  document.documentElement.style.setProperty('--accent-glow','rgba('+c.colorRgb+',.18)');
  // Header logo
  var logo=document.getElementById('hdrLogo');
  if(logo){logo.textContent=c.emoji;logo.style.background='rgba('+c.colorRgb+',.1)';logo.style.borderColor='rgba('+c.colorRgb+',.2)';}
}

/* ─── STEPS ─── */
function showStep(n){
  if(typeof n!=='number'||n<0||n>3)return;
  step=n;
  updateSteps(n);
  var main=document.getElementById('bkMain');
  main.innerHTML='';
  // Gestionar back bar
  var backBar=document.getElementById('bkBackBar');
  var backBtn=document.getElementById('bkBackBtn');
  var backBtnText=document.getElementById('bkBackBtnText');
  if(backBar && backBtn){
    if(n>=2){
      backBar.style.display='block';
      if(backBtnText){
        // Texto contextual según paso
        if(n===2)backBtnText.textContent=t('btn_back_service').replace(/^←\s*/,'');
        else if(n===3)backBtnText.textContent=t('btn_back_date').replace(/^←\s*/,'');
      }
      // Re-vincular click
      backBtn.onclick=function(){
        if(n===2){selectedWorkshop=null;showStep(1);}
        else if(n===3){
          // Si era taller, volver a la lista de talleres (step 2 workshops)
          if(selectedService&&selectedService.isWorkshop)showStep(2);
          else showStep(2);
        }
      };
    } else {
      backBar.style.display='none';
    }
  }
  if(n===0)renderCenterPick(main);
  else if(n===1)renderServicePick(main);
  else if(n===2)renderDateTimePick(main);
  else if(n===3)renderForm(main);
  // Scroll to top
  try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){window.scrollTo(0,0);}
}

function updateSteps(active){
  for(var i=0;i<4;i++){
    var si=document.getElementById('si'+i);
    var sn=document.getElementById('sn'+i);
    var sb=document.getElementById('sb'+i);
    if(!si)continue;
    si.className='step-item'+(i<active?' done':i===active?' active':'');
    // El step 0 (Centro) está oculto cuando hay 1 solo centro, así que mostramos i en lugar de i+1
    sn.textContent=i<active?'✓':String(i);
    if(sb)sb.className='step-bar'+(i<active?' done':'');
  }
}

// M&C schedule (loaded from Firebase config)


function timeToMins(t){var p=(t||'00:00').split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function minsToTime(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}

function generateSlots(startTime,endTime){
  var slots=[];
  var s=timeToMins(startTime),e=timeToMins(endTime);
  for(var m=s;m<e;m+=30)slots.push(minsToTime(m));
  return slots;
}

function getSlotsForDow(dow){









  // Centro Cuídate: schedule loaded from Firebase (or defaults)
  if(dow===0)return[]; // Sunday always closed
  if(CC_WORKING_DAYS&&CC_WORKING_DAYS.indexOf(dow)<0)return[]; // Firebase-configured rest days
  if(dow===6)return MORNING; // Saturday: morning only
  return MORNING.concat(AFTERNOON);
}

function pickCenter(id){
  selectedCenter=id;
  SERVICES=SERVICES_CC.slice();
  // F21 FIX: update header with actual center name
  var nameEl=document.getElementById('bkHdrName');
  if(nameEl&&CENTERS[id])nameEl.textContent=CENTERS[id].name;
  applyAccent(id);
  if(fbDB){
    var path='centrocuidate/booking/'+id;
    fbDB.ref(path+'/config').once('value').then(function(snap){
      var cfg=snap.val()||{};
      ownerPhone=(cfg.ownerPhone||'').replace(/[\s\-\+]/g,'');
      if(cfg.services)SERVICES.forEach(function(s){if(cfg.services[s.id]&&cfg.services[s.id].dur)s.dur=cfg.services[s.id].dur;});
      // F10 FIX: load CC schedule from Firebase config
      if(cfg.ccSchedule){
        var cs=cfg.ccSchedule;
        if(cs.days)CC_WORKING_DAYS=cs.days;
        if(cs.morningStart&&cs.morningEnd)MORNING=generateSlots(cs.morningStart,cs.morningEnd);
        if(cs.afternoonEnabled&&cs.afternoonStart&&cs.afternoonEnd)AFTERNOON=generateSlots(cs.afternoonStart,cs.afternoonEnd);
        else if(cs.afternoonEnabled===false)AFTERNOON=[];
      }
      // Load M&C schedule if set









      return fbDB.ref(path+'/takenSlots').once('value');
    }).then(function(snap){
      takenSlots=snap.val()||{};
      fbDB.ref(path+'/takenSlots').on('value',function(s){takenSlots=s.val()||{};});

      // Suscribirse a talleres en tiempo real (ruta única)
      fbDB.ref(path+'/workshops').on('value',function(s){
        workshops=s.val()||{};
        console.log('[Booking] talleres actualizados:',Object.keys(workshops).length);
        if(step===2&&selectedService&&selectedService.isWorkshop){
          var area=document.getElementById('workshopArea');
          if(area)renderWorkshopList(area);
        }
      },function(err){
        console.warn('[Booking] error cargando talleres:',err&&(err.message||err));
        workshops={};
      });
      showStep(1);
    }).catch(function(err){
      // BUG-E FIX: show error and continue anyway so booking is never blocked
      console.warn('[Booking] Firebase load failed:',err&&err.message);
      showStep(1); // continue with defaults — booking still works offline
    });
  }else{showStep(1);}
}

function renderServicePick(container){
  var d=div('bk-body fade-up');

    +'<div class="sec-sub">'+t('sub_service')+'</div>'
    +'<div id="svcList"></div>';
  container.appendChild(d);
  var list=document.getElementById('svcList');
  SERVICES.forEach(function(s){
    var card=document.createElement('div');
    var nm=svcName(s);
    var bdg=svcBadge(s);
    var dsc=svcDesc(s);
    card.className='svc-card'+(selectedService&&selectedService.id===s.id?' selected':'')+(bdg?' popular':'');
    var totalMins=(s.prepBefore||0)+s.dur+(s.prepAfter||0);
    var hasBuf=!!(s.prepBefore||s.prepAfter);
    var durLine=hasBuf
      ? fmtDur(s.dur)+' · '+fmtDur(totalMins)
      : fmtDur(s.dur);
    // Price display
    var priceHtml='';
    if(s.price===0||s.free){
      priceHtml='<div class="svc-price free">'+(LANG==='en'?'Free':'Gratuita')+'</div>';
    }else if(s.price){
      priceHtml='<div class="svc-price">'+s.price+'€</div>';
    }
    card.innerHTML='<div class="svc-icon">'+s.icon+'</div>'
      +'<div class="svc-info">'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">'
      +'<div class="svc-name">'+esc(nm)+'</div>'
      +(bdg?'<span class="svc-tag">'+esc(bdg)+'</span>':'')
      +'</div>'
      +'<div class="svc-dur">⏱ '+durLine+'</div>'
      +(dsc?'<div style="font-size:11px;color:var(--text3);font-weight:500;margin-top:4px;line-height:1.55">'+esc(dsc)+'</div>':'')
      +'</div>'
      +priceHtml
      +'<div class="svc-check">'+(selectedService&&selectedService.id===s.id?'✓':'')+'</div>';
    card.addEventListener('click',function(){selectedService=s;showStep(2);});
    list.appendChild(card);
  });
  // Trust row
  var trust=document.createElement('div');
  trust.className='trust-row';
  trust.innerHTML='<div class="trust-item">🔒 '+t('trust_secure')+'</div>'
    +'<div class="trust-item">⚡ '+t('trust_instant')+'</div>'
    +'<div class="trust-item">💚 '+t('trust_card')+'</div>';
  d.appendChild(trust);
}

function renderDateTimePick(container){
  // Si es taller (Skin Care), mostrar lista de talleres programados

function renderWorkshopList(wrap){
  if(!wrap)return;
  // Filtrar talleres futuros, activos, con plazas libres
  // y del servicio actualmente seleccionado (si tiene serviceId definido)
  var todayStr=new Date().toISOString().slice(0,10);
  var nowMins=new Date().getHours()*60+new Date().getMinutes();
  var list=[];
  Object.keys(workshops||{}).forEach(function(id){
    var w=workshops[id];
    if(!w||!w.date||!w.time)return;
    // Filtrar por serviceId si está definido (para múltiples tipos de taller en el futuro)
    if(w.serviceId&&selectedService&&w.serviceId!==selectedService.id)return;
    if(w.cancelled)return;
    if(w.date<todayStr)return;
    // Si es hoy, descartar si la hora ya pasó
    if(w.date===todayStr){
      var tp=(w.time||'').split(':');
      var wMins=(+tp[0]||0)*60+(+tp[1]||0);
      if(wMins<=nowMins)return;
    }
    var maxAt=w.maxAttendees||(selectedService&&selectedService.maxAttendees)||8;
    var occupied=Array.isArray(w.attendees)?w.attendees.length:Object.keys(w.attendees||{}).length;
    if(occupied>=maxAt)return; // sin plazas
    list.push({id:id,date:w.date,time:w.time,maxAttendees:maxAt,occupied:occupied,note:w.note||'',price:w.price});
  });
  // Ordenar por fecha+hora
  list.sort(function(a,b){
    if(a.date!==b.date)return a.date<b.date?-1:1;
    return a.time<b.time?-1:1;
  });
  if(!list.length){
    wrap.innerHTML='<div class="no-slots" style="padding:32px 18px">'
      +'<div style="font-size:42px;margin-bottom:10px">📅</div>'
      +'<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">'+t('no_workshops')+'</div>'
      +'<div style="font-size:12px;color:var(--text3);font-weight:500;line-height:1.6">'+t('no_workshops_sub')+'</div>'
      +(ownerPhone?'<a href="https://wa.me/'+esc(ownerPhone)+'?text='+encodeURIComponent(LANG==='en'?'Hello, I would like to sign up for the Skin Care Workshop when you schedule the next dates.':'Hola, me interesa apuntarme al Taller Skin Care cuando programéis las próximas fechas.')+'" target="_blank" rel="noopener" style="display:inline-block;margin-top:14px;padding:10px 18px;background:#25D366;color:#fff;border-radius:var(--r-pill);font-size:12px;font-weight:800;text-decoration:none">'+t('workshop_wa')+'</a>':'')
      +'</div>';
    return;
  }
  // Render lista
  var mesesEs=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var mesesEn=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var diasEs=['dom','lun','mar','mié','jue','vie','sáb'];
  var diasEn=['sun','mon','tue','wed','thu','fri','sat'];
  var meses=LANG==='en'?mesesEn:mesesEs;
  var dias=LANG==='en'?diasEn:diasEs;
  var html='';
  list.forEach(function(w){
    var dt=new Date(w.date+'T'+w.time+':00');
    var dia=dias[dt.getDay()];
    var diaN=dt.getDate();
    var mes=meses[dt.getMonth()];
    var libres=w.maxAttendees-w.occupied;
    var pct=Math.round((w.occupied/w.maxAttendees)*100);
    var pctColor=libres<=2?'var(--gold)':libres<=4?'var(--accent)':'var(--accent)';
    var urgenciaTxt=libres===1?t('last_seat'):libres<=2?t('few_seats',{n:libres}):libres+' '+t('seats_left');
    var urgenciaCol=libres<=2?'var(--gold)':'var(--accent)';
    var isSelected=selectedWorkshop&&selectedWorkshop.id===w.id;
    html+='<div class="ws-card'+(isSelected?' selected':'')+'" data-wid="'+esc(w.id)+'" style="background:var(--surface);border:'+(isSelected?'2px solid var(--accent)':'1.5px solid var(--border2)')+';border-radius:var(--r-lg);padding:14px;margin-bottom:10px;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:14px">';
    // Fecha pill
    html+='<div style="flex-shrink:0;width:62px;text-align:center;background:'+(isSelected?'var(--accent)':'var(--surface2)')+';border-radius:12px;padding:8px 4px;border:1.5px solid '+(isSelected?'var(--accent)':'var(--border2)')+'">';
    html+='<div style="font-size:9.5px;font-weight:800;color:'+(isSelected?'#fff':'var(--text3)')+';text-transform:uppercase;letter-spacing:.06em">'+esc(dia)+'</div>';
    html+='<div style="font-size:24px;font-weight:900;color:'+(isSelected?'#fff':'var(--text)')+';line-height:1.05">'+diaN+'</div>';
    html+='<div style="font-size:10px;font-weight:700;color:'+(isSelected?'#fff':'var(--text2)')+';text-transform:uppercase">'+esc(mes)+'</div>';
    html+='</div>';
    // Info
    html+='<div style="flex:1;min-width:0">';
    html+='<div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px">🕐 '+esc(w.time)+'</div>';
    html+='<div style="font-size:11px;font-weight:700;color:'+urgenciaCol+';margin-bottom:6px">👥 '+urgenciaTxt+'</div>';
    // Barra de progreso
    html+='<div style="height:5px;background:var(--surface3);border-radius:5px;overflow:hidden">';
    html+='<div style="height:100%;background:'+pctColor+';width:'+pct+'%;border-radius:5px;transition:width .3s"></div>';
    html+='</div>';
    if(w.note)html+='<div style="font-size:10.5px;color:var(--text3);margin-top:5px;line-height:1.5">'+esc(w.note)+'</div>';
    html+='</div>';
    // Check
    html+='<div style="flex-shrink:0;font-size:22px;color:'+(isSelected?'var(--accent)':'var(--border2)')+'">'+(isSelected?'✓':'›')+'</div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
  // Click handlers
  wrap.querySelectorAll('.ws-card').forEach(function(card){
    card.addEventListener('click',function(){
      var wid=card.getAttribute('data-wid');
      var w=workshops[wid];
      if(!w)return;
      // Re-verificar plazas (puede haber cambiado en tiempo real)
      var maxAt=w.maxAttendees||(selectedService&&selectedService.maxAttendees)||8;
      var occ=Array.isArray(w.attendees)?w.attendees.length:Object.keys(w.attendees||{}).length;
      if(occ>=maxAt){
        alert(LANG==='en'?'⚠️ This spot was just taken. Choose another date.':'⚠️ Esta plaza acaba de ocuparse. Elige otra fecha.');
        renderWorkshopList(wrap);
        return;
      }
      selectedWorkshop={id:wid,date:w.date,time:w.time,maxAttendees:maxAt,price:w.price};
      selectedDate=w.date;
      selectedTime=w.time;
      // Avanzar al paso siguiente directamente
      showStep(3);
    });
  });
  // Botón volver — eliminado, ya hay back bar arriba
}

function renderCalendar(wrap){
  var today=new Date();today.setHours(0,0,0,0);
  var months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  wrap.innerHTML='';
  // Nav
  var nav=div('cal-nav');
  nav.innerHTML='<button class="cal-btn" id="calPrev">‹</button>'
    +'<span class="cal-month-lbl">'+months[calMonth]+' '+calYear+'</span>'
    +'<button class="cal-btn" id="calNext">›</button>';
  wrap.appendChild(nav);
  nav.querySelector('#calPrev').addEventListener('click',function(){
    calMonth--;if(calMonth<0){calMonth=11;calYear--;}
    renderCalendar(wrap);clearSlots();selectedDate=null;selectedTime=null;
  });
  nav.querySelector('#calNext').addEventListener('click',function(){
    // F11 FIX: max 60 days ahead
    var maxD=new Date(today);maxD.setDate(today.getDate()+60);
    var nMo=calMonth+1>11?0:calMonth+1;var nYr=calMonth+1>11?calYear+1:calYear;
    if(nYr>maxD.getFullYear()||(nYr===maxD.getFullYear()&&nMo>maxD.getMonth()))return;
    calMonth++;if(calMonth>11){calMonth=0;calYear++;}
    renderCalendar(wrap);clearSlots();selectedDate=null;selectedTime=null;
  });
  // Grid
  var grid=div('cal-grid');
  ['L','M','X','J','V','S','D'].forEach(function(d){var el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  var first=new Date(calYear,calMonth,1);
  var startDow=first.getDay();startDow=startDow===0?6:startDow-1;
  for(var i=0;i<startDow;i++){var e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(var dd=1;dd<=daysInMonth;dd++){
    var date=new Date(calYear,calMonth,dd);date.setHours(0,0,0,0);
    var ds=toISO(date);
    var dow=date.getDay();
    var isToday=date.getTime()===today.getTime();
    var isPast=date<today;
    var maxBookD=new Date(today);maxBookD.setDate(today.getDate()+60);
    var isTooFar=date>maxBookD;
var maxBookDate=new Date(today);maxBookDate.setDate(today.getDate()+60);
var isTooFar=date>maxBookDate;
    var isSunday=dow===0;
    var dayEl=document.createElement('div');
    dayEl.textContent=dd;
    if(isPast){dayEl.className='cal-day past';}
    else if(isSunday||isTooFar){dayEl.className='cal-day closed';}
    else{
      var hasFree=hasFreeSlotsOnDay(ds,dow);
      if(!hasFree){dayEl.className='cal-day closed';}
      else{
        var cls='cal-day avail'+(isToday?' today-ring':'')+(selectedDate===ds?' sel':'');
        dayEl.className=cls;
        if(selectedDate!==ds){var dot=document.createElement('div');dot.className='avail-dot';dayEl.appendChild(dot);}
        ;(function(dateStr,el,dowInner){
          el.addEventListener('click',function(){
            selectedDate=dateStr;selectedTime=null;
            wrap.querySelectorAll('.cal-day.sel').forEach(function(x){x.className=x.className.replace(' sel','');x.className=x.className.replace('sel','')+'avail';});
            el.className='cal-day sel';
            renderSlots(document.getElementById('slotsArea'),dateStr,dowInner);
          });
        })(ds,dayEl,dow);
      }
    }
    grid.appendChild(dayEl);
  }
  wrap.appendChild(grid);
  if(selectedDate){
    var selDow=new Date(selectedDate+'T00:00:00').getDay();
    renderSlots(document.getElementById('slotsArea'),selectedDate,selDow);
  }
}

function getTotalBlocks(svc){
  // Total calendar blocks = prepBefore + dur + prepAfter (in 30-min units)
  var s=svc||selectedService||{dur:30,prepBefore:0,prepAfter:0};
  return Math.ceil(((s.prepBefore||0)+(s.dur||30)+(s.prepAfter||0))/30);
}

function isSlotTaken(dateStr,time,svc){
  // For Spa Facial (or any service with prepBefore):
  // the displayed start time is the actual appointment start,
  // but we must also check that the prepBefore window is free.
  var s=svc||selectedService||{dur:30,prepBefore:0,prepAfter:0};
  var prepBefore=s.prepBefore||0;
  var totalMins=(s.prepBefore||0)+(s.dur||30)+(s.prepAfter||0);
  var totalBlocks=Math.ceil(totalMins/30);
  // Check from (time - prepBefore) for totalBlocks
  var startCheckTime=addMins(time,-prepBefore);
  for(var b=0;b<totalBlocks;b++){
    var t=addMins(startCheckTime,b*30);
    if(takenSlots[dateStr+'_'+t])return true;
  }
  return false;
}

function hasFreeSlotsOnDay(dateStr,dow){
  var slots=getSlotsForDow(dow);
  for(var i=0;i<slots.length;i++){if(!isSlotTaken(dateStr,slots[i]))return true;}
  return false;
}

function renderSlots(wrap,dateStr,dow){
  wrap.innerHTML='';
  var allSlots=getSlotsForDow(dow);
  if(!allSlots.length){wrap.innerHTML='<div class="no-slots">📅 '+t('no_work_day')+'</div>';return;}

  // Split into morning/afternoon based on time (before/after 14:00)
  var morning=allSlots.filter(function(t){return timeToMins(t)<14*60;});
  var afternoon=allSlots.filter(function(t){return timeToMins(t)>=14*60;});
  var hasAnyFree=allSlots.some(function(t){return!isSlotTaken(dateStr,t);});
  if(!hasAnyFree){wrap.innerHTML='<div class="no-slots">😔 '+t('no_slots_today')+'</div>';return;}

  // Date pill
  var monthsEs=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var monthsEn=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var daysEs=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var daysEn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=LANG==='en'?monthsEn:monthsEs;
  var days=LANG==='en'?daysEn:daysEs;
  var dObj=new Date(dateStr+'T00:00:00');
  var dateStrFmt=LANG==='en'
    ? days[dObj.getDay()]+', '+months[dObj.getMonth()]+' '+dObj.getDate()
    : days[dObj.getDay()]+', '+dObj.getDate()+' de '+months[dObj.getMonth()];
  var datePill=div('');
  datePill.innerHTML='<div class="date-pill">📅 '+dateStrFmt+'</div>';
  wrap.appendChild(datePill);

  // Service prep info
  var svc=selectedService||{prepBefore:0,prepAfter:0,dur:30};
  if(svc.prepBefore||svc.prepAfter){
    var totalMins=(svc.prepBefore||0)+svc.dur+(svc.prepAfter||0);
    var note=div('');
    note.innerHTML='<div style="background:rgba(31,170,118,.07);border:1px solid rgba(31,170,118,.15);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:12px;font-weight:600;color:rgba(31,170,118,.85);line-height:1.65">'
      +'<div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:4px">'+svc.icon+' '+esc(svcName(svc))+'</div>'
      +(LANG==='en'
        ?'The chosen time is when <strong>your treatment starts</strong>. We reserve <strong>'+fmtDur(totalMins)+'</strong> total for preparation and closing.'
        :'La hora elegida es cuando <strong>empieza tu tratamiento</strong>. Reservamos <strong>'+fmtDur(totalMins)+'</strong> en total para preparación y cierre.')
      +'</div>';
    wrap.appendChild(note);
  }

  function renderPeriod(slots,label,emoji){
    if(!slots.length)return;
    var sec=div('slots-section');
    sec.innerHTML='<div class="slots-period-lbl">'+emoji+' '+label+'</div>';
    var sg=div('slots-grid');
    slots.forEach(function(tt){
      var btn=document.createElement('button');
      var taken=isSlotTaken(dateStr,tt);
      btn.className='slot-btn'+(taken?' taken':selectedTime===tt?' sel':'');
      btn.textContent=tt;
      if(!taken){
        btn.addEventListener('click',function(){
          selectedTime=tt;
          document.querySelectorAll('.slot-btn.sel').forEach(function(b){b.classList.remove('sel');});
          btn.classList.add('sel');
          renderNextBtn();
          // Scroll to next button
          setTimeout(function(){var nw=document.getElementById('dtNextWrap');if(nw)nw.scrollIntoView({behavior:'smooth',block:'center'});},200);
        });
      }else{btn.disabled=true;}
      sg.appendChild(btn);
    });
    sec.appendChild(sg);
    wrap.appendChild(sec);
  }

  renderPeriod(morning,t('morning'),'🌅');
  renderPeriod(afternoon,t('afternoon'),'🌆');

  function renderNextBtn(){
    var nw=document.getElementById('dtNextWrap');
    nw.innerHTML='';
    var selInfo=div('');
    selInfo.innerHTML='<div style="text-align:center;margin-bottom:14px;font-size:14px;font-weight:700;color:var(--text2)">'+t('chosen_time')+' <strong style="color:var(--accent);font-size:18px">'+selectedTime+'</strong></div>';
    nw.appendChild(selInfo);
    var btn=document.createElement('button');
    btn.className='bk-btn';btn.innerHTML=t('btn_continue');
    btn.addEventListener('click',function(){showStep(3);});
    nw.appendChild(btn);
    // Back button eliminado — ya hay back bar arriba
  }
  if(selectedTime)renderNextBtn();
}

/* ═══════════════════════════════════════
   SUBMIT
═══════════════════════════════════════ */
function submitRequest(){
  var name=((document.getElementById('bkName')||{}).value||'').trim();
  var phone=((document.getElementById('bkPhone')||{}).value||'').replace(/[\s\-\+]/g,'');
  var note=((document.getElementById('bkNote')||{}).value||'').trim().slice(0,500);
  if(!name||name.trim().length<2){showErr(t('err_name'));return;}
  if(!phone||phone.length<9){showErr(t('err_phone'));return;}
  var cleanPhone=phone.replace(/[\s\-\+\(\)]/g,'');
  if(cleanPhone.startsWith('0034'))cleanPhone=cleanPhone.slice(4);
  if(cleanPhone.startsWith('34')&&cleanPhone.length===11)cleanPhone=cleanPhone.slice(2);
  if(!/^[67]\d{8}$/.test(cleanPhone)){showErr(t('err_phone'));return;}
  // M7: check for recent duplicate request from same phone
  if(fbDB){
    var recentKey='bk_sent_'+cleanPhone.slice(-4);
    var lastSent=null;try{lastSent=sessionStorage.getItem(recentKey);}catch(e){}
    if(lastSent){
      var diff=(Date.now()-parseInt(lastSent,10))/1000/60;
      if(diff<30){
        showErr(LANG==='en'
          ?'You already sent a request with this number '+Math.round(diff)+' minutes ago. Wait for WhatsApp confirmation before sending another.'
          :'Ya enviaste una solicitud con este número hace '+Math.round(diff)+' minutos. Espera a recibir confirmación por WhatsApp antes de enviar otra.');
        return;
      }
    }
  }

  var gdpr=document.getElementById('bkGdpr');
  if(!gdpr||!gdpr.checked){showErr(t('err_gdpr'));return;}
  // Rate limiting: max 1 request per 30 seconds
  var lastSent=0;try{lastSent=parseInt(sessionStorage.getItem('bk_last_sent')||'0');}catch(e){}
  if(Date.now()-lastSent<30000){showErr(t('err_rate'));return;}
  var btn=document.getElementById('submitBtn');
  if(btn){btn.disabled=true;btn.textContent=t('sending');}
  var reqId='req_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  var req={
    id:reqId,
    center:selectedCenter,
    centerName:CENTERS[selectedCenter].name,
    service:selectedService.name,
    serviceId:selectedService.id,
    date:selectedDate,
    time:selectedTime,
    dur:selectedService.dur,
    prepBefore:selectedService.prepBefore||0,
    prepAfter:selectedService.prepAfter||0,
    totalMins:(selectedService.prepBefore||0)+selectedService.dur+(selectedService.prepAfter||0),
    clientName:name,
    clientPhone:phone,
    note:note,
    status:'pending',
    createdAt:new Date().toISOString()
  };
  // Si es taller, añadir referencia al workshopId
  if(selectedService.isWorkshop&&selectedWorkshop){
    req.isWorkshop=true;
    req.workshopId=selectedWorkshop.id;
  }
  // Try Firebase — but always show success and send WA regardless
  function onDone(){
    // M7: record submission to prevent duplicates
    try{sessionStorage.setItem('bk_sent_'+cleanPhone.slice(-4),Date.now().toString());}catch(e){}
    showSuccess(req,name);
    if(ownerPhone)setTimeout(function(){notifyOwnerWA(req);},900);
  }
  if(fbDB){
    // Para talleres: además de crear la request, escribir attendee provisional al taller.
    // Así otras personas viendo la lista ven la plaza ocupada inmediatamente.
    // Si la propietaria rechaza la request, se elimina del taller al rechazar (desde la app).
    var writes=[];
    writes.push(fbDB.ref('centrocuidate/booking/'+selectedCenter+'/requests/'+reqId).set(req));
    if(selectedService.isWorkshop&&selectedWorkshop){
      writes.push(fbDB.ref('centrocuidate/booking/'+selectedCenter+'/workshops/'+selectedWorkshop.id+'/attendees/'+reqId).set({
        name:name,
        phone:phone,
        note:note,
        status:'pending',
        requestId:reqId,
        createdAt:new Date().toISOString()
      }));
    }
    Promise.all(writes).then(onDone).catch(function(e){
      console.warn('Firebase write failed:',e.message,'— proceeding with WA only');
      onDone();
    });
  }else{
    onDone();
  }
}

function notifyOwnerWA(req){
  var c=CENTERS[req.center];
  var hasBuf=!!(req.prepBefore||req.prepAfter);
  var endTime=addMins(req.time, req.dur||30);
  var blockStart=req.prepBefore?addMins(req.time,-(req.prepBefore)):req.time;
  var blockEnd=addMins(req.time,(req.dur||30)+(req.prepAfter||0));
  var titleMsg=req.isWorkshop?'🆕 *NUEVA INSCRIPCIÓN A TALLER*':'🆕 *NUEVA SOLICITUD DE CITA*';
  var msg=titleMsg+'\n\n'
    +'👤 *Cliente:* '+req.clientName+'\n'
    +'📱 *Teléfono:* '+req.clientPhone+'\n'
    +'🏢 *Centro:* '+c.name+'\n'
    +'✨ *'+(req.isWorkshop?'Taller':'Servicio')+':* '+req.service+'\n'
    +'📅 *Fecha:* '+fmtDate(req.date)+'\n'
    +'🕐 *Hora:* '+req.time+(req.isWorkshop?'':' → '+endTime)+'\n'
    +(hasBuf&&!req.isWorkshop?'⏱️ *Bloqueo total:* '+blockStart+' → '+blockEnd+' ('+fmtDur(req.totalMins||req.dur)+')\n':'')
    +(req.note?'📝 *Nota:* '+req.note+'\n':'')
    +'\n_Solicitud online · MDC Leiva_';
  var num=ownerPhone.startsWith('34')?ownerPhone:'34'+ownerPhone;
  var url=(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)?'whatsapp://send?phone=':'https://wa.me/')+num+'&text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}

function cancelMyBooking(req){
  if(!req){return;}
  if(!ownerPhone){showErr(LANG==='en'?'Cannot cancel right now. Please contact the center directly.':'No se puede cancelar en este momento. Contacta directamente con el centro.');return;}
  // Formato fecha localizado
  var daysEs=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var daysEn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var mthsEs=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var mthsEn=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var days=LANG==='en'?daysEn:daysEs;
  var mths=LANG==='en'?mthsEn:mthsEs;
  var dObj=new Date(req.date+'T00:00:00');
  var dateLabel=LANG==='en'
    ? days[dObj.getDay()]+', '+mths[dObj.getMonth()]+' '+dObj.getDate()
    : days[dObj.getDay()]+', '+dObj.getDate()+' de '+mths[dObj.getMonth()];
  var msg;
  if(LANG==='en'){
    msg='Hello \uD83D\uDC4B, I am '+esc(req.clientName||'')+(req.clientPhone?' ('+req.clientPhone+')':'')+' and I want to CANCEL my appointment request:\n\n';
    msg+='\uD83D\uDCC5 '+esc(dateLabel)+'\n';
    msg+='\u23F0 '+esc(req.time||'')+'\n';
    msg+='\u2728 '+esc(req.service||'')+'\n\n';
    msg+='Please confirm the cancellation. Thank you.';
  } else {
    msg='Hola \uD83D\uDC4B, soy '+esc(req.clientName||'')+(req.clientPhone?' ('+req.clientPhone+')':'')+' y quiero CANCELAR mi solicitud de cita:\n\n';
    msg+='\uD83D\uDCC5 '+esc(dateLabel)+'\n';
    msg+='\u23F0 '+esc(req.time||'')+'\n';
    msg+='\u2728 '+esc(req.service||'')+'\n\n';
    msg+='Por favor confírmame la cancelación. Gracias.';
  }
  var waHref='https://wa.me/34'+ownerPhone.replace(/\D/g,'')+'?text='+encodeURIComponent(msg);
  window.open(waHref,'_blank');
}

/* ─── UTILS ─── */
function showErr(msg){
  var el=document.getElementById('bkErr');
  if(el){
    el.textContent='⚠️ '+msg;
    el.classList.add('show');
    setTimeout(function(){el.classList.remove('show');},5000);
    return;
  }
  // Fallback: toast flotante si no hay bkErr en pantalla
  var toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(216,74,63,.95);color:#fff;padding:12px 18px;border-radius:14px;font-size:13px;font-weight:700;box-shadow:0 8px 28px rgba(0,0,0,.18);z-index:9999;max-width:340px;text-align:center';
  toast.textContent='⚠️ '+msg;
  document.body.appendChild(toast);
  setTimeout(function(){toast.style.opacity='0';toast.style.transition='opacity .3s';},4000);
  setTimeout(function(){if(toast.parentNode)toast.parentNode.removeChild(toast);},4500);
}
function div(cls){var el=document.createElement('div');el.className=cls;return el;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){var d=new Date(s+'T00:00:00');var days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];var mths=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return days[d.getDay()]+', '+d.getDate()+' de '+mths[d.getMonth()];}
function fmtDur(m){return m<60?m+' min':Math.floor(m/60)+'h'+(m%60?m%60+'min':'');}
function addMins(t,m){var p=t.split(':');var tot=parseInt(p[0])*60+parseInt(p[1])+m;var h=Math.floor(tot/60)%24,mn=tot%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');}
</script>
