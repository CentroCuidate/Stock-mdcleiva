<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#2ECC8E;--green-dark:#1BA370;
  --green-light:rgba(46,204,142,.1);--green-glow:rgba(46,204,142,.18);
  --gold:#C9952A;--gold-dark:#8A6010;--gold-light:rgba(201,149,42,.1);
  --bg:#08100B;--surface:#0F1A12;--surface2:#162118;--surface3:#1C2A1E;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#E8F5EE;--text2:rgba(232,245,238,.58);--text3:rgba(232,245,238,.3);
  --red:#E8402A;--blue:#4A9EF5;
  --r:14px;--r-lg:20px;--r-xl:26px;--r-pill:100px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --accent:var(--green);--accent-dark:var(--green-dark);
  --accent-light:var(--green-light);--accent-glow:var(--green-glow);
}
html{background:var(--bg);min-height:100vh;overscroll-behavior:none}
body{
  font-family:'Nunito',sans-serif;color:var(--text);background:var(--bg);
  min-height:100dvh;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(28px + var(--safe-b));
  overflow-x:hidden;
}

/* ── HEADER ── */
.bk-hdr{
  position:sticky;top:0;z-index:50;
  padding:calc(var(--safe-t) + 10px) 18px 12px;
  display:flex;align-items:center;gap:12px;
  background:rgba(8,16,11,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.bk-logo{
  width:38px;height:38px;border-radius:11px;
  object-fit:cover;flex-shrink:0;
  background:rgba(46,204,142,.08);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  border:1px solid rgba(46,204,142,.15);
}
.bk-hdr-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.2px;font-family:'Playfair Display',serif}
.bk-hdr-sub{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.04em;margin-top:2px}
.bk-online{margin-left:auto;padding:4px 12px;border-radius:var(--r-pill);background:rgba(46,204,142,.1);border:1px solid rgba(46,204,142,.22);font-size:10px;font-weight:800;color:var(--green);letter-spacing:.1em;text-transform:uppercase;flex-shrink:0;display:flex;align-items:center;gap:5px}
.bk-online::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── STEP INDICATOR ── */
.steps-wrap{padding:14px 18px 0;display:flex;align-items:center;gap:0}
.step-item{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;color:var(--text3);transition:color .25s;flex-shrink:0}
.step-item.active{color:var(--accent)}
.step-item.done{color:var(--accent)}
.step-num{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;transition:all .25s}
.step-item.active .step-num{background:var(--accent);border-color:var(--accent);color:#fff}
.step-item.done .step-num{background:var(--accent);border-color:var(--accent);color:#fff}
.step-bar{flex:1;height:2px;background:var(--border);margin:0 6px;border-radius:2px;transition:background .3s}
.step-bar.done{background:var(--accent)}

/* ── CONTENT AREA ── */
.bk-body{padding:20px 18px;max-width:480px;margin:0 auto}
.sec-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:5px}
.sec-sub{font-size:13px;color:var(--text2);font-weight:500;line-height:1.65;margin-bottom:20px}

/* ── CENTER CARDS ── */
.center-card{
  display:flex;align-items:center;gap:14px;
  padding:18px 16px;border-radius:var(--r-xl);
  border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  margin-bottom:12px;-webkit-tap-highlight-color:transparent;
}
.center-card::before{content:"";position:absolute;inset:0;opacity:0;transition:opacity .2s}
.center-card:active{transform:scale(.98)}
.center-card.cc::before{background:linear-gradient(135deg,rgba(46,204,142,.06),transparent 60%)}
.center-card.mc::before{background:linear-gradient(135deg,rgba(201,149,42,.06),transparent 60%)}
.center-card:hover::before,.center-card:active::before{opacity:1}
.center-card.cc{border-color:rgba(46,204,142,.18)}
.center-card.mc{border-color:rgba(201,149,42,.18)}
.cc-logo-wrap{width:64px;height:64px;border-radius:16px;overflow:hidden;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid rgba(255,255,255,.06)}
.cc-logo-img{width:100%;height:100%;object-fit:cover}
.center-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.2px;margin-bottom:3px;font-family:'Playfair Display',serif}
.center-addr{font-size:11px;font-weight:500;color:var(--text3);line-height:1.6}
.center-arrow{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;margin-left:auto;flex-shrink:0;transition:transform .2s}
.center-card:hover .center-arrow,.center-card:active .center-arrow{transform:translateX(3px)}
.cc .center-arrow{background:rgba(46,204,142,.12);color:var(--green)}
.mc .center-arrow{background:rgba(201,149,42,.12);color:var(--gold)}

/* ── SERVICE CARDS ── */
.svc-card{
  display:flex;align-items:center;gap:13px;
  padding:14px 15px;border-radius:var(--r);
  border:1.5px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:all .18s;margin-bottom:8px;
  -webkit-tap-highlight-color:transparent;
}
.svc-card:active{transform:scale(.98)}
.svc-card.selected{border-color:var(--accent);background:var(--accent-light)}
.svc-icon{width:42px;height:42px;border-radius:11px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--border)}
.svc-name{font-size:14px;font-weight:800;color:var(--text)}
.svc-dur{font-size:11px;font-weight:600;color:var(--text3);margin-top:2px}
.svc-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;transition:all .18s}
.svc-card.selected .svc-check{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s}
.cal-btn:active{transform:scale(.92)}
.cal-month-lbl{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:18px}
.cal-dow{text-align:center;font-size:9.5px;font-weight:800;color:var(--text3);letter-spacing:.09em;text-transform:uppercase;padding:5px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;position:relative;border:2px solid transparent;-webkit-tap-highlight-color:transparent}
.cal-day.empty{cursor:default;background:transparent}
.cal-day.past{color:var(--text3);cursor:not-allowed;opacity:.4}
.cal-day.closed{color:var(--text3);cursor:not-allowed;background:var(--surface2);opacity:.35}
.cal-day.avail{color:var(--text);background:var(--surface2)}
.cal-day.avail:active,.cal-day.avail:hover{background:var(--accent-light);border-color:rgba(46,204,142,.3)}
.cal-day.sel{background:var(--accent)!important;color:#fff!important;border-color:transparent!important;box-shadow:0 4px 16px var(--accent-glow)}
.cal-day.today-ring{border-color:rgba(255,255,255,.2)}
.avail-dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.6}

/* ── SLOTS ── */
.slots-section{margin-bottom:6px}
.slots-period-lbl{font-size:9.5px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.slots-period-lbl::after{content:"";flex:1;height:1px;background:var(--border)}
.slots-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.slot-btn{padding:10px 4px;border-radius:10px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:12.5px;font-weight:700;text-align:center;cursor:pointer;transition:all .15s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.slot-btn:active{transform:scale(.94)}
.slot-btn.taken{color:var(--text3);background:var(--surface);border-color:var(--border);cursor:not-allowed;text-decoration:line-through;opacity:.4;font-size:11px}
.slot-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 14px var(--accent-glow)}
.no-slots{text-align:center;padding:20px;color:var(--text3);font-size:13px;font-weight:600;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border)}

/* ── FORM ── */
.bk-lbl{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;display:block;margin-bottom:7px}
.bk-inp{width:100%;padding:14px 16px;border:1.5px solid var(--border2);border-radius:var(--r);background:var(--surface2);color:var(--text);font-size:16px;font-family:'Nunito',inherit;font-weight:600;-webkit-appearance:none;outline:none;transition:border-color .2s;caret-color:var(--accent)}
.bk-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.bk-inp::placeholder{color:var(--text3);font-weight:500}
.bk-field{margin-bottom:16px}

/* ── SUMMARY BOX ── */
.summary-box{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px}
.summary-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.summary-sede-name{font-size:15px;font-weight:800;color:var(--text);font-family:'Playfair Display',serif;margin-bottom:2px}
.summary-sede-addr{font-size:11px;color:var(--text3);font-weight:500}
.summary-rows{padding:4px 0}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-lbl{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.sum-val{font-size:13.5px;font-weight:800;color:var(--text)}

/* ── BUTTONS ── */
.bk-btn{
  width:100%;padding:16px;border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-dark));
  color:#fff;font-size:15px;font-weight:800;font-family:'Nunito',inherit;
  cursor:pointer;letter-spacing:.02em;
  box-shadow:0 8px 24px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.15);
  transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;
}
.bk-btn:active{transform:scale(.97)}
.bk-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bk-btn-ghost{width:100%;padding:13px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;font-family:'Nunito',inherit;cursor:pointer;transition:all .15s;margin-top:10px}
.bk-btn-ghost:active{background:var(--surface3)}
.bk-btn-map{
  display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;padding:14px;border-radius:var(--r);border:1.5px solid rgba(74,158,245,.3);
  background:rgba(74,158,245,.08);color:#7AB8FF;font-size:14px;font-weight:700;
  font-family:'Nunito',inherit;cursor:pointer;text-decoration:none;transition:all .15s;
}
.bk-btn-map:active{background:rgba(74,158,245,.15)}

/* ── ERROR ── */
.bk-error{background:rgba(232,64,42,.1);border:1.5px solid rgba(232,64,42,.25);border-radius:var(--r);padding:11px 14px;font-size:12.5px;font-weight:700;color:#FF8070;display:none;margin-bottom:12px}
.bk-error.show{display:block}

/* ── SUCCESS ── */
.success-wrap{min-height:55vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px}
.success-ring{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 24px;box-shadow:0 12px 40px var(--accent-glow);animation:popIn .55s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;letter-spacing:-.3px;margin-bottom:10px}
.success-sub{font-size:13.5px;color:var(--text2);font-weight:500;line-height:1.75;max-width:300px;margin:0 auto 28px}

/* ── ADDRESS CARD ── */
.addr-card{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r-lg);padding:18px;text-align:left;margin-bottom:16px;width:100%;max-width:340px}
.addr-sede-name{font-size:15px;font-weight:800;color:var(--text);font-family:'Playfair Display',serif;margin-bottom:6px}
.addr-line{font-size:13px;color:var(--text2);font-weight:500;line-height:1.7;display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
.addr-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* ── LOADER ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:35vh;gap:14px}
.spinner{width:38px;height:38px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-lbl{font-size:13px;font-weight:600;color:var(--text3)}

/* ── NOTICE ── */
.bk-notice{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;font-size:11.5px;font-weight:600;color:var(--text3);line-height:1.65;margin-top:14px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .32s ease both}
</style>
</head>

/* ─── STEPS ─── */
function showStep(n){
  step=n;
  updateSteps(n);
  var main=document.getElementById('bkMain');
  main.innerHTML='';
  if(n===0)renderCenterPick(main);
  else if(n===1)renderServicePick(main);
  else if(n===2)renderDateTimePick(main);
  else if(n===3)renderForm(main);
}

function updateSteps(active){
  for(var i=0;i<4;i++){
    var si=document.getElementById('si'+i);
    var sn=document.getElementById('sn'+i);
    var sb=document.getElementById('sb'+i);
    if(!si)continue;
    si.className='step-item'+(i<active?' done':i===active?' active':'');
    sn.textContent=i<active?'✓':(i+1);
    if(sb)sb.className='step-bar'+(i<active?' done':'');
  }
}

function renderCalendar(wrap){
  var today=new Date();today.setHours(0,0,0,0);
  var months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  wrap.innerHTML='';
  // Nav
  var nav=div('cal-nav');
  nav.innerHTML='<button class="cal-btn" id="calPrev">‹</button>'
    +'<span class="cal-month-lbl">'+months[calMonth]+' '+calYear+'</span>'
    +'<button class="cal-btn" id="calNext">›</button>';
  wrap.appendChild(nav);
  nav.querySelector('#calPrev').addEventListener('click',function(){
    calMonth--;if(calMonth<0){calMonth=11;calYear--;}
    renderCalendar(wrap);clearSlots();selectedDate=null;selectedTime=null;
  });
  nav.querySelector('#calNext').addEventListener('click',function(){
    calMonth++;if(calMonth>11){calMonth=0;calYear++;}
    renderCalendar(wrap);clearSlots();selectedDate=null;selectedTime=null;
  });
  // Grid
  var grid=div('cal-grid');
  ['L','M','X','J','V','S','D'].forEach(function(d){var el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  var first=new Date(calYear,calMonth,1);
  var startDow=first.getDay();startDow=startDow===0?6:startDow-1;
  for(var i=0;i<startDow;i++){var e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(var dd=1;dd<=daysInMonth;dd++){
    var date=new Date(calYear,calMonth,dd);date.setHours(0,0,0,0);
    var ds=toISO(date);
    var dow=date.getDay();
    var isToday=date.getTime()===today.getTime();
    var isPast=date<today;
    var isSunday=dow===0;
    var dayEl=document.createElement('div');
    dayEl.textContent=dd;
    if(isPast){dayEl.className='cal-day past';}
    else if(isSunday){dayEl.className='cal-day closed';}
    else{
      var hasFree=hasFreeSlotsOnDay(ds,dow);
      if(!hasFree){dayEl.className='cal-day closed';}
      else{
        var cls='cal-day avail'+(isToday?' today-ring':'')+(selectedDate===ds?' sel':'');
        dayEl.className=cls;
        if(selectedDate!==ds){var dot=document.createElement('div');dot.className='avail-dot';dayEl.appendChild(dot);}
        ;(function(dateStr,el,dowInner){
          el.addEventListener('click',function(){
            selectedDate=dateStr;selectedTime=null;
            wrap.querySelectorAll('.cal-day.sel').forEach(function(x){x.className=x.className.replace(' sel','');x.className=x.className.replace('sel','')+'avail';});
            el.className='cal-day sel';
            renderSlots(document.getElementById('slotsArea'),dateStr,dowInner);
          });
        })(ds,dayEl,dow);
      }
    }
    grid.appendChild(dayEl);
  }
  wrap.appendChild(grid);
  if(selectedDate){
    var selDow=new Date(selectedDate+'T00:00:00').getDay();
    renderSlots(document.getElementById('slotsArea'),selectedDate,selDow);
  }
}

function clearSlots(){
  var sa=document.getElementById('slotsArea');if(sa)sa.innerHTML='';
  var nw=document.getElementById('dtNextWrap');if(nw)nw.innerHTML='';
}

function getSlotsForDow(dow){return dow===6?MORNING:MORNING.concat(AFTERNOON);}

function getTotalBlocks(svc){
  // Total calendar blocks = prepBefore + dur + prepAfter (in 30-min units)
  var s=svc||selectedService||{dur:30,prepBefore:0,prepAfter:0};
  return Math.ceil(((s.prepBefore||0)+(s.dur||30)+(s.prepAfter||0))/30);
}

function isSlotTaken(dateStr,time,svc){
  // For Spa Facial (or any service with prepBefore):
  // the displayed start time is the actual appointment start,
  // but we must also check that the prepBefore window is free.
  var s=svc||selectedService||{dur:30,prepBefore:0,prepAfter:0};
  var prepBefore=s.prepBefore||0;
  var totalMins=(s.prepBefore||0)+(s.dur||30)+(s.prepAfter||0);
  var totalBlocks=Math.ceil(totalMins/30);
  // Check from (time - prepBefore) for totalBlocks
  var startCheckTime=addMins(time,-prepBefore);
  for(var b=0;b<totalBlocks;b++){
    var t=addMins(startCheckTime,b*30);
    if(takenSlots[dateStr+'_'+t])return true;
  }
  return false;
}

function hasFreeSlotsOnDay(dateStr,dow){
  var slots=getSlotsForDow(dow);
  for(var i=0;i<slots.length;i++){if(!isSlotTaken(dateStr,slots[i]))return true;}
  return false;
}

function renderSlots(wrap,dateStr,dow){
  wrap.innerHTML='';
  var allSlots=getSlotsForDow(dow);
  var morning=MORNING.filter(function(t){return allSlots.includes(t);});
  var afternoon=dow===6?[]:AFTERNOON;
  var hasAnyFree=allSlots.some(function(t){return!isSlotTaken(dateStr,t);});
  if(!hasAnyFree){wrap.innerHTML='<div class="no-slots">😔 Sin huecos disponibles este día. Prueba otra fecha.</div>';return;}

  // If service has prepBefore/After, show info note
  var svc=selectedService||{prepBefore:0,prepAfter:0,dur:30};
  if(svc.prepBefore||svc.prepAfter){
    var totalMins=(svc.prepBefore||0)+svc.dur+(svc.prepAfter||0);
    wrap.innerHTML='<div style="background:rgba(46,204,142,.07);border:1px solid rgba(46,204,142,.18);border-radius:var(--r);padding:11px 14px;margin-bottom:14px;font-size:12px;font-weight:600;color:rgba(46,204,142,.85);line-height:1.65">'
      +'<div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:4px">'+svc.icon+' '+esc(svc.name)+'</div>'
      +'La hora que eliges es cuando <strong>empieza tu tratamiento</strong>. Bloqueamos '
      +'<strong>'+fmtDur(totalMins)+'</strong> en total para preparación y cierre.'
      +'<div style="margin-top:6px;font-size:11px;color:var(--text3);font-weight:500">'
      +'Ej: si eliges las <strong>10:00</strong> → bloqueamos de <strong>'
      +addMins('10:00',-(svc.prepBefore||0))+'</strong> a <strong>'
      +addMins('10:00',svc.dur+(svc.prepAfter||0))+'</strong></div>'
      +'</div>';
  }

  function renderPeriod(slots,label){
    if(!slots.length)return;
    var sec=div('slots-section');
    sec.innerHTML='<div class="slots-period-lbl">'+label+'</div>';
    var sg=div('slots-grid');
    slots.forEach(function(t){
      var btn=document.createElement('button');
      var taken=isSlotTaken(dateStr,t);
      btn.className='slot-btn'+(taken?' taken':selectedTime===t?' sel':'');
      btn.textContent=t;
      if(!taken){
        btn.addEventListener('click',function(){
          selectedTime=t;
          document.querySelectorAll('.slot-btn.sel').forEach(function(b){b.classList.remove('sel');});
          btn.classList.add('sel');
          renderNextBtn();
        });
      }else{btn.disabled=true;}
      sg.appendChild(btn);
    });
    sec.appendChild(sg);
    wrap.appendChild(sec);
  }

  renderPeriod(morning,'Mañana');
  renderPeriod(afternoon,'Tarde');

  function renderNextBtn(){
    var nw=document.getElementById('dtNextWrap');
    nw.innerHTML='';
    var btn=document.createElement('button');
    btn.className='bk-btn';btn.textContent='Continuar →';
    btn.addEventListener('click',function(){showStep(3);});
    nw.appendChild(btn);
    var back=document.createElement('button');
    back.className='bk-btn-ghost';back.textContent='← Cambiar servicio';
    back.addEventListener('click',function(){showStep(1);});
    nw.appendChild(back);
  }
  if(selectedTime)renderNextBtn();
}

═══════════════════════════════════════ */
function submitRequest(){
  var name=((document.getElementById('bkName')||{}).value||'').trim();
  var phone=((document.getElementById('bkPhone')||{}).value||'').replace(/[\s\-\+]/g,'');
  var note=((document.getElementById('bkNote')||{}).value||'').trim();
  if(!name){showErr('Por favor escribe tu nombre');return;}
  if(!phone||phone.length<9){showErr('Introduce tu teléfono (mínimo 9 dígitos)');return;}
  var btn=document.getElementById('submitBtn');
  if(btn){btn.disabled=true;btn.textContent='Enviando…';}
  var reqId='req_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  var req={
    id:reqId,
    center:selectedCenter,
    centerName:CENTERS[selectedCenter].name,
    service:selectedService.name,
    serviceId:selectedService.id,
    date:selectedDate,
    time:selectedTime,
    dur:selectedService.dur,
    prepBefore:selectedService.prepBefore||0,
    prepAfter:selectedService.prepAfter||0,
    totalMins:(selectedService.prepBefore||0)+selectedService.dur+(selectedService.prepAfter||0),
    clientName:name,
    clientPhone:phone,
    note:note,
    status:'pending',
    createdAt:new Date().toISOString()
  };
  // Try Firebase — but always show success and send WA regardless
  function onDone(){
    showSuccess(req,name);
    if(ownerPhone)setTimeout(function(){notifyOwnerWA(req);},900);
  }
  if(fbDB){
    fbDB.ref('centrocuidate/booking/'+selectedCenter+'/requests/'+reqId).set(req)
      .then(onDone)
      .catch(function(e){
        console.warn('Firebase write failed:',e.message,'— proceeding with WA only');
        // Still show success and send WA even if Firebase fails
        // (Firebase rules may not be updated yet)
        onDone();
      });
  }else{
    onDone();
  }
}

function notifyOwnerWA(req){
  var c=CENTERS[req.center];
  var hasBuf=!!(req.prepBefore||req.prepAfter);
  var endTime=addMins(req.time, req.dur||30);
  var blockStart=req.prepBefore?addMins(req.time,-(req.prepBefore)):req.time;
  var blockEnd=addMins(req.time,(req.dur||30)+(req.prepAfter||0));
  var msg='🆕 *NUEVA SOLICITUD DE CITA*\n\n'
    +'👤 *Cliente:* '+req.clientName+'\n'
    +'📱 *Teléfono:* '+req.clientPhone+'\n'
    +'🏢 *Centro:* '+c.name+'\n'
    +'✨ *Servicio:* '+req.service+'\n'
    +'📅 *Fecha:* '+fmtDate(req.date)+'\n'
    +'🕐 *Hora de cita:* '+req.time+(hasBuf?' → '+endTime:' → '+endTime)+'\n'
    +(hasBuf?'⏱️ *Bloqueo total:* '+blockStart+' → '+blockEnd+' ('+fmtDur(req.totalMins||req.dur)+')\n':'')
    +(req.note?'📝 *Nota:* '+req.note+'\n':'')
    +'\n_Solicitud online · MDC Leiva_';
  var num=ownerPhone.startsWith('34')?ownerPhone:'34'+ownerPhone;
  var url=(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)?'whatsapp://send?phone=':'https://wa.me/')+num+'&text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}

function startOver(){
  selectedCenter=null;selectedService=null;selectedDate=null;selectedTime=null;takenSlots={};
  document.documentElement.style.setProperty('--accent','#2ECC8E');
  document.documentElement.style.setProperty('--accent-dark','#1BA370');
  document.documentElement.style.setProperty('--accent-light','rgba(46,204,142,.1)');
  document.documentElement.style.setProperty('--accent-glow','rgba(46,204,142,.18)');
  var logo=document.getElementById('hdrLogo');if(logo){logo.textContent='✦';logo.style.background='rgba(46,204,142,.08)';logo.style.borderColor='rgba(46,204,142,.15)';}
  document.getElementById('stepsWrap').style.display='flex';
  showStep(0);
}

/* ─── UTILS ─── */
function showErr(msg){var el=document.getElementById('bkErr');if(!el)return;el.textContent='⚠️ '+msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},5000);}
function div(cls){var el=document.createElement('div');el.className=cls;return el;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){var d=new Date(s+'T00:00:00');var days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];var mths=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return days[d.getDay()]+', '+d.getDate()+' de '+mths[d.getMonth()];}
function fmtDur(m){return m<60?m+' min':Math.floor(m/60)+'h'+(m%60?m%60+'min':'');}
function addMins(t,m){var p=t.split(':');var tot=parseInt(p[0])*60+parseInt(p[1])+m;var h=Math.floor(tot/60)%24,mn=tot%60;return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');}
</script>
